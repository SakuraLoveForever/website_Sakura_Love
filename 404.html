<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | Sakura_Love</title>
    <meta name="description" content="页面不存在，玩一局围住小猫再返回主页。" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        padding: 32px 16px;
        background: #eeeeee;
        color: #1d1d1f;
        font-family: "SF Pro Text", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      .not-found {
        width: min(720px, 100%);
        text-align: center;
      }

      .not-found h1 {
        margin: 0 0 8px;
        font-size: clamp(42px, 10vw, 76px);
        line-height: 1;
      }

      .not-found p {
        margin: 6px 0;
        color: #555555;
        font-size: clamp(17px, 3.8vw, 24px);
        line-height: 1.45;
      }

      #catch-the-cat {
        width: 100%;
        margin-top: 28px;
        overflow: hidden;
        text-align: center;
      }

      .home-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 18px;
        color: #2388d9;
        font-size: 22px;
        line-height: 1.2;
        text-decoration: none;
      }

      .home-link:hover {
        color: #006fd6;
        text-decoration: underline;
      }

      .home-link img {
        width: 28px;
        height: 28px;
      }

      @media (max-width: 520px) {
        body {
          align-items: flex-start;
          padding-top: 24px;
        }

        .home-link {
          font-size: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main class="not-found">
      <h1>404</h1>
      <p>温馨提醒：您访问的页面不存在或已经被删除。</p>
      <p>先玩一局《围住小猫》吧。</p>

      <div id="catch-the-cat" aria-label="围住小猫小游戏"></div>

      <a class="home-link" href="/" title="返回主页">
        <img src="/assets/404-cat/images/home2.png" alt="" />
        <span>返回主页</span>
      </a>
    </main>

    <script src="/assets/404-cat/js/phaser.min.js"></script>
    <script src="/assets/404-cat/js/catch-the-cat.js"></script>
    <script>
      window.game = new CatchTheCatGame({
        w: 11,
        h: 11,
        r: 20,
        backgroundColor: 0xffffff,
        parent: "catch-the-cat",
        statusBarAlign: "center",
        credit: "yansheng836/404pages"
      });
    </script>
  </body>
</html>
